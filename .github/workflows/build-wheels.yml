name: Build wheels

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheel ${{ matrix.python }}-${{ matrix.buildplat[1] }}
    runs-on: ${{ matrix.buildplat[0] }}
    strategy:
      fail-fast: false
      matrix:
        buildplat:
          - [ubuntu-latest, manylinux_x86_64]
          - [ubuntu-latest, manylinux2014_x86_64]
          - [macos-15-intel, macosx_x86_64]
          - [macos-14, macosx_arm64]
          - [windows-2022, win_amd64]
        python: ["cp39", "cp310", "cp311", "cp312", "cp313", "cp314"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup macOS GCC
        if: startsWith(matrix.buildplat[0], 'macos')
        shell: bash
        run: |
          set -euxo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew list gcc >/dev/null 2>&1 || brew install gcc
          GCC_BIN_DIR="$(brew --prefix gcc)/bin"
          echo "${GCC_BIN_DIR}" >> "$GITHUB_PATH"
          echo "MACOS_CC=$(compgen -G "${GCC_BIN_DIR}/gcc-[0-9]*" | sort -V | tail -1)" >> "$GITHUB_ENV"
          echo "MACOS_CXX=$(compgen -G "${GCC_BIN_DIR}/g++-[0-9]*" | sort -V | tail -1)" >> "$GITHUB_ENV"
          echo "MACOS_FC=$(compgen -G "${GCC_BIN_DIR}/gfortran-[0-9]*" | sort -V | tail -1)" >> "$GITHUB_ENV"
          if [[ "${{ matrix.buildplat[1] }}" == "macosx_x86_64" ]]; then
            echo "MACOSX_DEPLOYMENT_TARGET=15.0" >> "$GITHUB_ENV"
          else
            echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"
          fi

      - name: Setup Windows MSYS2
        if: matrix.buildplat[1] == 'win_amd64'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-pkgconf

      - name: Setup Windows tool env
        if: matrix.buildplat[1] == 'win_amd64'
        shell: pwsh
        run: |
          $mingwBin = (Get-Command gcc.exe | Where-Object { $_.Source -like '*mingw64\bin\*' } | Select-Object -First 1).Source | Split-Path
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "MSYS2_CC=$((Join-Path $mingwBin 'gcc.exe') -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_CXX=$((Join-Path $mingwBin 'g++.exe') -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_FC=$((Join-Path $mingwBin 'gfortran.exe') -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSYS2_PKG_CONFIG=$((Join-Path $mingwBin 'pkg-config.exe') -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          pip install delvewheel

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.buildplat[1] == 'manylinux2014_x86_64' && 'manylinux_x86_64' || matrix.buildplat[1] }}
          CIBW_SKIP: "*-win32 *-musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.buildplat[1] == 'manylinux2014_x86_64' && 'manylinux2014' || 'manylinux_2_28' }}
          CIBW_BEFORE_BUILD_LINUX: yum install -y gcc-gfortran || dnf install -y gcc-gfortran
          CIBW_BEFORE_BUILD: python -m pip install meson ninja
          CIBW_BEFORE_BUILD_WINDOWS: python -m pip install meson ninja
          CIBW_ENVIRONMENT_LINUX: FC=gfortran CC=gcc
          CIBW_ENVIRONMENT_WINDOWS: CC=${{ env.MSYS2_CC }} CXX=${{ env.MSYS2_CXX }} FC=${{ env.MSYS2_FC }} F77=${{ env.MSYS2_FC }} F90=${{ env.MSYS2_FC }} PKG_CONFIG=${{ env.MSYS2_PKG_CONFIG }}
          CIBW_ENVIRONMENT_MACOS: FC=${{ env.MACOS_FC }} F77=${{ env.MACOS_FC }} F90=${{ env.MACOS_FC }} CC=${{ env.MACOS_CC }} CXX=${{ env.MACOS_CXX }} MACOSX_DEPLOYMENT_TARGET=${{ env.MACOSX_DEPLOYMENT_TARGET }}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: delvewheel repair -w {dest_dir} {wheel}
          CIBW_TEST_COMMAND: python -c "import xvortices; print('xvortices import ok')"
          CIBW_TEST_SKIP: ${{ matrix.buildplat[1] == 'manylinux2014_x86_64' && '*' || '' }}
        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.buildplat[1] }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
